name: CI

on:
  push:
    branches: [master, v*.*.*]
  pull_request:
    branches: [master, v*.*.*]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        node-version: [18, 20, 22, 24, 25, 26]
        vscode-version: [stable, insiders]

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Compile
        run: npm run compile

      - name: Run tests
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 10
          max_attempts: 2
          command: xvfb-run -a npm test -- --vscode-version ${{ matrix.vscode-version }}
