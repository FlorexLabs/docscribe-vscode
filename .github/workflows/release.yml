name: Release

on:
  push:
    tags:
      - v*
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. 0.1.0)'
        required: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Compile
        run: npm run compile

      - name: Run tests
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 10
          max_attempts: 2
          command: xvfb-run -a npm test

      - name: Package VSIX
        run: npx vsce package --out docscribe-vscode.vsix

      - name: Create Release
        run: |
          TAG="${{ github.ref_name }}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="v${{ inputs.version }}"
          fi
          gh release create "$TAG" \
            --title "$TAG" \
            --generate-notes \
            docscribe-vscode.vsix
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
